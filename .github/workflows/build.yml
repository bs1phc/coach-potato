name: Build desktop binaries

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: coach-potato-linux
            binary: dist/coach-potato
          - os: windows-latest
            artifact: coach-potato-windows
            binary: dist/coach-potato.exe
          - os: macos-latest
            artifact: coach-potato-macos
            binary: dist/coach-potato
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller
          pip install pywebview || true
      - name: Build
        shell: bash
        run: |
          ICON=""
          [[ "${{ matrix.os }}" == windows-latest ]] && ICON="--icon assets/icon.ico"
          [[ "${{ matrix.os }}" == macos-latest ]] && ICON="--icon assets/icon.icns"
          pyinstaller --onefile --noconfirm --name coach-potato \
            --add-data "static:static" --add-data "VERSION:." $ICON desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
      - name: Attach binary to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          EXT=""
          [[ "${{ matrix.binary }}" == *.exe ]] && EXT=".exe"
          OUT="${{ matrix.artifact }}${EXT}"
          cp "${{ matrix.binary }}" "$OUT"
          gh release create "$GITHUB_REF_NAME" --generate-notes 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" "$OUT" --clobber
