name: Build desktop binaries

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: coach-potato-linux
            binary: dist/coach-potato
          - os: windows-latest
            artifact: coach-potato-windows
            binary: dist/coach-potato.exe
          - os: macos-latest
            artifact: coach-potato-macos
            binary: dist/coach-potato-macos.zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller
          pip install pywebview || true
      - name: Build
        shell: bash
        run: |
          ICON=""
          WINDOWED=""
          # --windowed suppresses the console/Terminal window that would
          # otherwise pop up alongside the pywebview app window; ignored on
          # Linux (PyInstaller has no console concept there). On macOS it
          # also switches the output from a flat binary to a proper .app
          # bundle, which is what makes double-click-to-launch not open
          # Terminal in the first place.
          [[ "${{ matrix.os }}" == windows-latest ]] && ICON="--icon assets/icon.ico" && WINDOWED="--windowed"
          [[ "${{ matrix.os }}" == macos-latest ]] && ICON="--icon assets/icon.icns" && WINDOWED="--windowed"
          pyinstaller --onefile --noconfirm --name coach-potato \
            --add-data "static:static" --add-data "VERSION:." $ICON $WINDOWED desktop.py
      - name: Package macOS app bundle
        if: matrix.os == 'macos-latest'
        run: ditto -c -k --sequesterRsrc --keepParent dist/coach-potato.app dist/coach-potato-macos.zip
      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" packaging\windows-installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest'
        with:
          name: coach-potato-windows-installer
          path: dist/installer/CoachPotatoSetup.exe
      - name: Attach binary to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          EXT=""
          [[ "${{ matrix.binary }}" == *.exe ]] && EXT=".exe"
          [[ "${{ matrix.binary }}" == *.zip ]] && EXT=".zip"
          OUT="${{ matrix.artifact }}${EXT}"
          cp "${{ matrix.binary }}" "$OUT"
          gh release create "$GITHUB_REF_NAME" --generate-notes 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" "$OUT" --clobber
      - name: Attach Windows installer to release
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "$GITHUB_REF_NAME" dist/installer/CoachPotatoSetup.exe --clobber
